<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            display: flex;
            width: 100%;
            max-width: 1000px;
            height: auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            min-height: 600px;
        }

        .left-section {
            flex: 1;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 60px 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .left-section h1 {
            font-size: 2.5em;
            margin-bottom: 20px;
            font-weight: 700;
        }

        .left-section p {
            font-size: 1.1em;
            margin-bottom: 30px;
            line-height: 1.6;
            opacity: 0.9;
        }

        .left-section .icon {
            font-size: 4em;
            margin-bottom: 20px;
        }

        .right-section {
            flex: 1;
            padding: 60px 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .right-section h2 {
            font-size: 2em;
            color: #333;
            margin-bottom: 10px;
            text-align: right;
        }

        .right-section p {
            color: #666;
            margin-bottom: 30px;
            text-align: right;
            font-size: 0.95em;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            text-align: right;
            font-size: 0.95em;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            transition: all 0.3s ease;
            text-align: right;
            direction: rtl;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-group input::placeholder {
            color: #999;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            margin-bottom: 25px;
            justify-content: space-between;
        }

        .checkbox-group input[type="checkbox"] {
            margin-left: 8px;
            width: auto;
        }

        .checkbox-group label {
            margin: 0;
            cursor: pointer;
            font-weight: 500;
            font-size: 0.9em;
            color: #666;
        }

        .forgot-password {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .forgot-password:hover {
            color: #764ba2;
            text-decoration: underline;
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.05em;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.6);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .signup-section {
            text-align: center;
            margin-top: 20px;
        }

        .signup-section p {
            color: #666;
            text-align: center;
        }

        .signup-section a {
            color: #667eea;
            text-decoration: none;
            font-weight: 700;
            transition: color 0.3s ease;
        }

        .signup-section a:hover {
            color: #764ba2;
            text-decoration: underline;
        }

        .social-login {
            margin-top: 25px;
            text-align: center;
        }

        .social-login p {
            color: #999;
            margin-bottom: 15px;
            font-size: 0.9em;
            text-align: center;
        }

        .social-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .social-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 2px solid #e0e0e0;
            background: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2em;
            transition: all 0.3s ease;
        }

        .social-btn:hover {
            border-color: #667eea;
            color: #667eea;
            transform: translateY(-3px);
        }

        @media (max-width: 768px) {
            .container {
                flex-direction: column;
                min-height: auto;
            }

            .left-section {
                padding: 40px 30px;
                min-height: 300px;
            }

            .left-section h1 {
                font-size: 2em;
            }

            .left-section p {
                font-size: 1em;
            }

            .right-section {
                padding: 40px 30px;
            }

            .right-section h2 {
                font-size: 1.7em;
            }
        }

        .error-message {
            color: #e74c3c;
            font-size: 0.9em;
            margin-top: 5px;
            display: none;
            text-align: right;
        }

        .input-error {
            border-color: #e74c3c !important;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="left-section">
            <div class="icon">🔐</div>
            <h1>أهلا بك!</h1>
            <p>استمتع بتجربة آمنة وسهلة في التسجيل الدخول. نحن هنا لخدمتك بأفضل ما يمكن.</p>
        </div>

        <div class="right-section">
            <h2>تسجيل الدخول</h2>
            <p>أدخل بيانات حسابك للمتابعة</p>

            <form id="loginForm">
                <div class="form-group">
                    <label for="email">البريد الإلكتروني</label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        placeholder="أدخل بريدك الإلكتروني"
                        required
                    >
                    <div class="error-message" id="emailError">البريد الإلكتروني غير صحيح</div>
                </div>

                <div class="form-group">
                    <label for="password">كلمة المرور</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        placeholder="أدخل كلمة المرور"
                        required
                    >
                    <div class="error-message" id="passwordError">كلمة المرور مطلوبة</div>
                </div>

                <div class="checkbox-group">
                    <input type="checkbox" id="remember" name="remember">
                    <label for="remember">تذكرني</label>
                    <a href="#" class="forgot-password">هل نسيت كلمة المرور؟</a>
                </div>

                <button type="submit" class="login-btn">تسجيل الدخول</button>

                <div class="signup-section">
                    <p>ليس لديك حساب؟ <a href="#">إنشاء حساب جديد</a></p>
                </div>

                <div class="social-login">
                    <p>أو تسجيل الدخول عبر</p>
                    <div class="social-buttons">
                        <button type="button" class="social-btn" title="Google">G</button>
                        <button type="button" class="social-btn" title="Facebook">f</button>
                        <button type="button" class="social-btn" title="Twitter">𝕏</button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <script>
        const form = document.getElementById('loginForm');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            
            // إعادة تعيين الأخطاء
            document.querySelectorAll('.error-message').forEach(el => el.style.display = 'none');
            document.querySelectorAll('input').forEach(el => el.classList.remove('input-error'));

            let isValid = true;

            // التحقق من البريد الإلكتروني
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(emailInput.value)) {
                document.getElementById('emailError').style.display = 'block';
                emailInput.classList.add('input-error');
                isValid = false;
            }

            // التحقق من كلمة المرور
            if (passwordInput.value.length < 6) {
                document.getElementById('passwordError').textContent = 'كلمة المرور يجب أن تكون 6 أحرف على الأقل';
                document.getElementById('passwordError').style.display = 'block';
                passwordInput.classList.add('input-error');
                isValid = false;
            }

            if (isValid) {
                alert('تم تسجيل الدخول بنجاح!\nالبريد: ' + emailInput.value);
                // هنا يمكن إرسال البيانات إلى الخادم
            }
        });

        // تنظيف الأخطاء عند البدء بالكتابة
        emailInput.addEventListener('input', function() {
            if (this.classList.contains('input-error')) {
                this.classList.remove('input-error');
                document.getElementById('emailError').style.display = 'none';
            }
        });

        passwordInput.addEventListener('input', function() {
            if (this.classList.contains('input-error')) {
                this.classList.remove('input-error');
                document.getElementById('passwordError').style.display = 'none';
            }
        });
    </script>
</body>
</html>
